name: cjm-media-plugin-silero-vad
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    # Result data noun (VADResult). Substrate (cjm-plugin-system) is
    # AUTO-INJECTED by `cjm-ctl install-all` (schema v2), so it is no longer
    # listed here — same reason it was dropped from plugins.yaml interface_libs.
    - cjm-capability-primitives

    # Utilities
    - fastcore
    - pydantic

    # Audio I/O (model-ready audio read via soundfile; decode/resample is
    # upstream ffmpeg, so librosa is no longer needed)
    - numpy
    - soundfile

    # VAD Inference
    - silero-vad
    - onnxruntime  # Use onnxruntime-gpu if GPU acceleration is strictly required, but CPU is usually fine for VAD

    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx
