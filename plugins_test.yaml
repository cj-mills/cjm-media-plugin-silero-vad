plugins:
  # ----------------------------------------------------------------
  # Media Analysis: silero-vad (this library)
  #
  # CPU-only VAD with bundled wheel weights — no GPU monitor needed
  # (no GPU work to attribute) and no upstream ffmpeg step (librosa
  # loads .mp3 directly). The substrate (cjm-plugin-system) is pinned
  # to the local source so the Track 19 WORKER_ENV injection is tested
  # against the current substrate.
  # ----------------------------------------------------------------
  - name: silero-vad
    env_name: test-silero-vad

    # Environment File
    env_file: "./environment.yml"

    # The Plugin Package (local source)
    package: "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-media-plugin-silero-vad/"

    # Interface Libraries
    interface_libs:
      - "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-plugin-system/"
      - "git+https://github.com/cj-mills/cjm-media-plugin-system.git"
